<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LLM Chat Handoff — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      color: #222;
    }
    h1 { font-size: 18px; }
    label { display: block; font-size: 13px; margin-bottom: 6px; font-weight: 600; }
    input {
      width: 100%;
      padding: 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    button {
      padding: 8px 16px;
      background: #6c5ce7;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    p.hint { font-size: 12px; color: #666; line-height: 1.5; }
    #saved { font-size: 12px; color: #2e7d32; margin-left: 10px; }
  </style>
</head>
<body>
  <h1>LLM Chat Handoff — Settings</h1>

  <label for="apiKey">Gemini API key</label>
  <input type="password" id="apiKey" placeholder="AIza…" />
  <button id="saveBtn">Save</button>
  <span id="saved"></span>

  <p class="hint">
    Get a free key from Google AI Studio (aistudio.google.com/apikey). The key is
    used to call Gemini's free tier for compressing your chat transcripts, and is
    stored only in your browser's synced extension storage — it is never sent
    anywhere except Google's API.
  </p>

  <script src="options.js"></script>
</body>
</html>
